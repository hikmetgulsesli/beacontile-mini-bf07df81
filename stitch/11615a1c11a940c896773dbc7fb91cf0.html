<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Record Editor - BeaconTile Mini</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#bec6e0",
                        "primary-container": "#131b2e",
                        "primary-fixed": "#dae2fd",
                        "on-background": "#1b1b1d",
                        "on-surface-variant": "#45464d",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#565e74",
                        "secondary-container": "#d0e1fb",
                        "on-surface": "#1b1b1d",
                        "on-tertiary-container": "#98805d",
                        "on-error": "#ffffff",
                        "surface-dim": "#dcd9db",
                        "secondary": "#505f76",
                        "outline": "#76777d",
                        "secondary-fixed-dim": "#b7c8e1",
                        "surface-container-high": "#eae7e9",
                        "on-primary-fixed": "#131b2e",
                        "tertiary": "#000000",
                        "surface-container-low": "#f6f3f5",
                        "on-tertiary-fixed": "#271901",
                        "primary": "#000000",
                        "on-secondary": "#ffffff",
                        "surface-container": "#f0edef",
                        "outline-variant": "#c6c6cd",
                        "on-primary": "#ffffff",
                        "background": "#fcf8fa",
                        "surface-bright": "#fcf8fa",
                        "on-primary-container": "#7c839b",
                        "surface-variant": "#e4e2e4",
                        "on-secondary-container": "#54647a",
                        "primary-fixed-dim": "#bec6e0",
                        "tertiary-fixed-dim": "#dec29a",
                        "on-tertiary-fixed-variant": "#574425",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#303032",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#0b1c30",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#d3e4fe",
                        "on-secondary-fixed-variant": "#38485d",
                        "tertiary-fixed": "#fcdeb5",
                        "surface": "#fcf8fa",
                        "tertiary-container": "#271901",
                        "surface-container-highest": "#e4e2e4",
                        "inverse-on-surface": "#f3f0f2",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#3f465c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "gutter": "12px",
                        "sm": "8px",
                        "xs": "4px",
                        "container_max": "1024px",
                        "md": "16px",
                        "base": "4px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "display": ["Hanken Grotesk"],
                        "body-sm": ["Hanken Grotesk"],
                        "code-label": ["JetBrains Mono"],
                        "body-md": ["Hanken Grotesk"],
                        "header-sm": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "display": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "code-label": ["11px", { "lineHeight": "14px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "header-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom scrollbar for textareas */
        textarea::-webkit-scrollbar {
            width: 6px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background-color: #c6c6cd;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center justify-center p-md">
<!-- Record Editor Canvas (Acts as a focused overlay/sub-view) -->
<div class="w-full max-w-2xl bg-surface-container-lowest border border-outline-variant shadow-[0_2px_4px_rgba(15,23,42,0.05)] rounded overflow-hidden flex flex-col">
<!-- Header -->
<div class="flex items-center justify-between px-lg py-md border-b border-outline-variant bg-surface-container-low">
<div class="flex items-center gap-sm">
<button aria-label="Go Back" class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center p-xs rounded hover:bg-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col">
<h1 class="font-header-sm text-header-sm text-primary flex items-center gap-xs">
                        Edit Record
                        <span class="bg-tertiary-fixed text-on-tertiary-fixed-variant font-code-label text-[10px] px-1 py-0.5 rounded ml-2">Unsaved Changes</span>
</h1>
</div>
</div>
</div>
<!-- Form Content -->
<div class="p-lg flex-1 overflow-y-auto">
<form class="space-y-lg" id="record-editor-form">
<!-- ID Field (Read-only) -->
<div class="space-y-xs">
<label class="block font-code-label text-code-label text-on-surface-variant uppercase tracking-widest">Record ID</label>
<div class="flex items-center gap-sm bg-surface-container py-2 px-3 border border-outline-variant rounded select-none">
<span class="material-symbols-outlined text-outline text-[16px]" data-icon="tag">tag</span>
<span class="font-code-label text-[13px] text-on-surface">REC-8492-AX</span>
</div>
</div>
<!-- Label Field (Required) -->
<div class="space-y-xs">
<label class="block font-code-label text-code-label text-on-surface-variant uppercase tracking-widest" for="record-label">
                        Label <span class="text-error">*</span>
</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded py-2 px-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-body-md text-on-surface placeholder:text-outline" id="record-label" placeholder="Enter record label" type="text" value="Primary Database Node"/>
<!-- Validation Message (Hidden by default, shown for demonstration) -->
<div class="absolute -bottom-5 left-0 flex items-center gap-1 text-error text-xs hidden" id="label-error">
<span class="material-symbols-outlined text-[14px]" data-icon="error">error</span>
<span>Label cannot be empty</span>
</div>
</div>
</div>
<!-- Status Field (Enum) -->
<div class="space-y-xs">
<label class="block font-code-label text-code-label text-on-surface-variant uppercase tracking-widest">Status</label>
<div class="grid grid-cols-3 gap-sm">
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="status" type="radio" value="OK"/>
<div class="h-10 flex items-center justify-center border border-outline-variant rounded bg-surface-container-lowest text-on-surface-variant peer-checked:border-primary peer-checked:bg-primary-fixed peer-checked:text-on-primary-fixed transition-colors font-code-label text-[12px]">
<span class="w-2 h-2 rounded-full bg-[#10b981] mr-2"></span> OK
                            </div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="status" type="radio" value="WARN"/>
<div class="h-10 flex items-center justify-center border border-outline-variant rounded bg-surface-container-lowest text-on-surface-variant peer-checked:border-primary peer-checked:bg-primary-fixed peer-checked:text-on-primary-fixed transition-colors font-code-label text-[12px]">
<span class="w-2 h-2 rounded-full bg-[#f59e0b] mr-2"></span> WARN
                            </div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="status" type="radio" value="DOWN"/>
<div class="h-10 flex items-center justify-center border border-outline-variant rounded bg-surface-container-lowest text-on-surface-variant peer-checked:border-primary peer-checked:bg-error-container peer-checked:text-on-error-container transition-colors font-code-label text-[12px]">
<span class="w-2 h-2 rounded-full bg-[#ef4444] mr-2"></span> DOWN
                            </div>
</label>
</div>
</div>
<!-- Description Field (Optional) -->
<div class="space-y-xs">
<div class="flex justify-between items-baseline">
<label class="block font-code-label text-code-label text-on-surface-variant uppercase tracking-widest" for="record-desc">Description</label>
<span class="text-[10px] text-outline">Optional</span>
</div>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded py-2 px-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-body-md text-on-surface resize-none placeholder:text-outline" id="record-desc" placeholder="Add contextual details..." rows="3">Handles core transaction processing for region US-EAST.</textarea>
</div>
<!-- Tags Field -->
<div class="space-y-xs">
<label class="block font-code-label text-code-label text-on-surface-variant uppercase tracking-widest">Tags</label>
<div class="flex flex-wrap gap-xs mb-sm">
<span class="inline-flex items-center gap-1 px-2 py-1 bg-surface-container border border-outline-variant rounded font-code-label text-[10px] text-on-surface">
                            database
                            <button class="text-outline hover:text-error hover:bg-surface-variant rounded-full w-4 h-4 flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[12px]" data-icon="close">close</span>
</button>
</span>
<span class="inline-flex items-center gap-1 px-2 py-1 bg-surface-container border border-outline-variant rounded font-code-label text-[10px] text-on-surface">
                            critical
                            <button class="text-outline hover:text-error hover:bg-surface-variant rounded-full w-4 h-4 flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[12px]" data-icon="close">close</span>
</button>
</span>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant border-dashed rounded py-1.5 px-3 focus:outline-none focus:border-primary focus:border-solid transition-colors font-body-sm text-on-surface placeholder:text-outline" id="record-tags" placeholder="Add tag and press Enter" type="text"/>
</div>
</div>
</form>
</div>
<!-- Action Footer -->
<div class="px-lg py-md border-t border-outline-variant bg-surface-container-lowest flex justify-end gap-md">
<button class="px-4 py-2 border border-outline-variant bg-surface-container-lowest text-on-surface font-code-label text-code-label rounded hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" type="button">
                Cancel
            </button>
<button class="px-4 py-2 bg-primary text-on-primary font-code-label text-code-label rounded hover:bg-inverse-surface transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 flex items-center gap-2" type="button">
<span class="material-symbols-outlined text-[16px]" data-icon="save">save</span>
                Save Record
            </button>
</div>
</div>
<script>
        // Simple client-side validation demonstration
        const labelInput = document.getElementById('record-label');
        const labelError = document.getElementById('label-error');
        const saveBtn = document.querySelector('button.bg-primary');

        labelInput.addEventListener('input', (e) => {
            if (e.target.value.trim() === '') {
                labelInput.classList.add('border-error', 'focus:border-error', 'focus:ring-error');
                labelInput.classList.remove('border-outline-variant', 'focus:border-primary', 'focus:ring-primary');
                labelError.classList.remove('hidden');
                saveBtn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                labelInput.classList.remove('border-error', 'focus:border-error', 'focus:ring-error');
                labelInput.classList.add('border-outline-variant', 'focus:border-primary', 'focus:ring-primary');
                labelError.classList.add('hidden');
                saveBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>
</body></html>
